openapi: 3.0.3
info:
  title: Solid MCP API
  description: |
    API for Solid's MCP text2sql tool. Converts a natural-language question and
    semantic layer ID(s) into a SQL query and explanation via the Azure bridge.

    **One-shot (bridge)**  
    Send the management key, question, and semantic layer ID(s) in a single POST
    to the bridge URL. No separate auth exchange or Bearer token—the management
    key is used by the bridge for authentication.
  version: 1.0.0
  contact:
    name: Solid

servers:
  - url: "https://solid-mcp-bridge-efeqgrayfnhvbsf0.eastus2-01.azurewebsites.net/api/mcp/text2sql?code=DnqGmyuh1gnv_ow4xE5O7sPBO80MXZeUTosP_rIFxIFyAzFu_Y3Xpg=="
    description: Azure REST-to-MCP bridge (one-shot; path and function key included in URL)

tags:
  - name: MCP
    description: Solid MCP text2sql via bridge

paths:
  /:
    post:
      tags:
        - MCP
      summary: Convert natural language to SQL (one-shot)
      description: |
        Sends the management key, question, and semantic layer ID(s) in one request.
        The bridge performs auth and MCP text2sql; no separate auth type or Bearer
        token is required.
      operationId: text2sql
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Text2SqlRequest'
            examples:
              singleLayer:
                summary: Single semantic layer
                value:
                  management_key: "<your-management-key>"
                  question: "How many orders were placed last month?"
                  semantic_layer_ids: ["00000000-0000-0000-0000-000000000000"]
              multipleLayers:
                summary: Multiple semantic layers
                value:
                  management_key: "<your-management-key>"
                  question: "What is total revenue by region?"
                  semantic_layer_ids:
                    - "aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaaaa"
                    - "bbbbbbbb-bbbb-bbbb-bbbb-bbbbbbbbbbbb"
      responses:
        '200':
          description: Success. Returns the MCP text2sql result (SQL and explanation).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Text2SqlResponse'
        '400':
          description: Bad request (missing or invalid body).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid or expired management key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed. Use POST.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: MCP call failed (e.g. Solid server error).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    Text2SqlRequest:
      type: object
      required:
        - management_key
        - question
        - semantic_layer_ids
      properties:
        management_key:
          type: string
          description: Solid management key (used by the bridge for auth; no separate token needed).
          example: "<your-management-key>"
        question:
          type: string
          description: Natural-language question to convert into a SQL query.
          example: "How many users signed up last month?"
        semantic_layer_ids:
          type: array
          items:
            type: string
            format: uuid
          description: UUID(s) of the Solid semantic layer. Must be a non-empty array.
          minItems: 1
          example: ["00000000-0000-0000-0000-000000000000"]

    Text2SqlResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: Result from Solid MCP text2sql (generated SQL and explanation, often including markdown code blocks).

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: Human-readable error message.
